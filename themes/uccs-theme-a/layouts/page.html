{{ define "body_class" }}pg-standalone{{ end }}

{{ define "head_extra" }}
  <link rel="stylesheet" href="/css/prose.css">
{{ end }}

{{ define "main" }}
<article class="pg-standalone">

  <header class="pg-standalone__hero">
    {{ with .Params.eyebrow }}<p class="pg-standalone__eyebrow">{{ . }}</p>{{ end }}
    <h1 class="pg-standalone__title">
      {{ .Title }}
      {{ with .Params.subtitle }}<span class="pg-standalone__subtitle">{{ . }}</span>{{ end }}
    </h1>
    {{ with .Params.lead }}<p class="pg-standalone__lead">{{ . }}</p>{{ end }}
  </header>

  <div class="pg-standalone__body prose">
    {{ .Content }}
  </div>

</article>
{{ end }}
