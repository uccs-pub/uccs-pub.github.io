{{ define "head-extra" }}
  {{ with .Site.Home.OutputFormats.Get "RSS" }}
    <link rel="alternate" type="application/rss+xml"
          title="{{ site.Title }}"
          href="{{ .Permalink }}">
  {{ end }}
{{ end }}

{{ define "main" }}

  {{ partial "section-header.html" . }}

  {{ partial "article-render.html" (dict
    "pages"  .Pages.ByDate.Reverse
    "layout" "list"
  ) }}

{{ end }}
