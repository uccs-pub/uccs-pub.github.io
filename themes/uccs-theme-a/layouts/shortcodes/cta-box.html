<div class="cta-box">
  <div class="cta-box__left">
    {{ .Get "heading" | markdownify }}
    <p>{{ .Get "body" }}</p>
  </div>
  <div class="cta-box__right">
    {{ if .Get "btn1_href" }}
    <a href="{{ .Get "btn1_href" }}" class="sc-btn sc-btn--primary">{{ .Get "btn1_label" }}</a>
    {{ end }}
    {{ if .Get "btn2_href" }}
    <a href="{{ .Get "btn2_href" }}" class="sc-btn sc-btn--outline">{{ .Get "btn2_label" }}</a>
    {{ end }}
    {{ with .Get "note" }}<p class="cta-box__note">{{ . }}</p>{{ end }}
  </div>
</div>
