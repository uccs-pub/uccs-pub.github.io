{{/*
  Partial: toc.html
  Usage: {{- partial "toc.html" . -}}
  Renders a collapsible table of contents using the page's heading structure.
*/}}
{{- $label := "Cuprins" -}}
{{- $toc := .Page.TableOfContents -}}

{{- if and $toc (ne $toc "") -}}
<details class="sc-toc" open>
  <summary class="sc-toc__summary">
    <span class="sc-toc__label">{{ $label }}</span>
    <svg class="sc-toc__chevron" viewBox="0 0 16 16" fill="none"
         stroke="currentColor" stroke-width="1.8" aria-hidden="true">
      <polyline points="4 6 8 10 12 6"/>
    </svg>
  </summary>
  <nav class="sc-toc__body" aria-label="{{ $label }}">
    {{ $toc }}
  </nav>
</details>
{{- end -}}
